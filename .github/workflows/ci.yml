name: CI
on: [push, pull_request]
jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install transport deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev libssh2-1-dev libsecret-1-dev g++-14
          # GCC 13 (ubuntu-latest's default) ICEs in morph_fn_to_coro when compiling
          # our QCoro coroutine code; GCC 14 fixed that class of coroutine bugs.
          echo "CC=gcc-14"  >> "$GITHUB_ENV"
          echo "CXX=g++-14" >> "$GITHUB_ENV"
      - name: Install transport deps (macOS)
        if: runner.os == 'macOS'
        run: brew install libssh2
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          # Newer Qt dropped the legacy AGL framework reference that older 6.x
          # emitted on macOS (the current Xcode SDK removed AGL). Paired with the
          # defensive AGL strip in Dependencies.cmake for older Qt.
          version: '6.9.1'
          cache: true
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure --build-config Release --test-output-size-failed 0
